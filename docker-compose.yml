version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rightmove_scraper
      POSTGRES_USER: scraper
      POSTGRES_PASSWORD: scraper_dev
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d   # runs on first start

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    command: redis-server --save "" --appendonly no  # no persistence for dev

volumes:
  postgres_data:
